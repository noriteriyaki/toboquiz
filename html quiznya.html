<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MBTI Quiz</title>
  <style>
    body { font-family: Arial, sans-serif; background:#f4f4f4; display:flex; justify-content:center; }
    .container { background:#fff; padding:20px; margin-top:40px; border-radius:10px; width:400px; box-shadow:0 5px 15px rgba(0,0,0,0.1); }
    h2 { text-align:center; }

    .progress-bar { width:100%; height:10px; background:#ddd; border-radius:10px; overflow:hidden; margin-bottom:15px; }
    .progress { height:100%; width:0%; background:#6c9ef8; transition: width 0.3s ease; }

    .question { margin-bottom:15px; }
    button { display:block; width:100%; padding:10px; margin:5px 0; border:none; border-radius:5px; cursor:pointer; }
    .optionA { background:#6c9ef8; color:white; }
    .optionB { background:#f86c6c; color:white; }
    #result { text-align:center; font-size:20px; margin-top:20px; }
  </style>
</head>
<body>

<div class="container">
  <h2>MBTI Quiz</h2>
  <div class="progress-bar">
    <div class="progress" id="progress"></div>
  </div>
  <div id="quiz"></div>
  <div id="result"></div>
</div>

<script>
const questions = [
  { text: "Kamu lebih suka...", a: "Sendiri (I)", b: "Bersama orang (E)", typeA: "I", typeB: "E" },
  { text: "Saat capek kamu...", a: "Menyendiri (I)", b: "Cari teman (E)", typeA: "I", typeB: "E" },
  { text: "Di acara sosial kamu...", a: "Pendiam (I)", b: "Aktif ngobrol (E)", typeA: "I", typeB: "E" },

  { text: "Kamu lebih percaya...", a: "Fakta (S)", b: "Intuisi (N)", typeA: "S", typeB: "N" },
  { text: "Kamu fokus ke...", a: "Detail (S)", b: "Gambaran besar (N)", typeA: "S", typeB: "N" },
  { text: "Kamu lebih suka...", a: "Realistis (S)", b: "Imajinatif (N)", typeA: "S", typeB: "N" },

  { text: "Saat ambil keputusan...", a: "Logika (T)", b: "Perasaan (F)", typeA: "T", typeB: "F" },
  { text: "Kamu lebih pentingkan...", a: "Kebenaran (T)", b: "Harmoni (F)", typeA: "T", typeB: "F" },
  { text: "Kamu orangnya...", a: "Objektif (T)", b: "Empati (F)", typeA: "T", typeB: "F" },

  { text: "Kamu lebih suka...", a: "Terencana (J)", b: "Fleksibel (P)", typeA: "J", typeB: "P" },
  { text: "Deadline menurutmu...", a: "Harus ditaati (J)", b: "Bisa santai (P)", typeA: "J", typeB: "P" },
  { text: "Gaya kerja kamu...", a: "Terstruktur (J)", b: "Spontan (P)", typeA: "J", typeB: "P" }
];

let current = 0;
let scores = { I:0, E:0, S:0, N:0, T:0, F:0, J:0, P:0 };

function updateProgress() {
  const progressPercent = (current / questions.length) * 100;
  document.getElementById("progress").style.width = progressPercent + "%";
}

function showQuestion() {
  const q = questions[current];
  updateProgress();
  document.getElementById("quiz").innerHTML = `
    <div class="question">${q.text}</div>
    <button class="optionA" onclick="answer('${q.typeA}')">${q.a}</button>
    <button class="optionB" onclick="answer('${q.typeB}')">${q.b}</button>
  `;
}

function answer(type) {
  scores[type]++;
  current++;

  if (current < questions.length) {
    showQuestion();
  } else {
    updateProgress();
    showResult();
  }
}

function showResult() {
  const result =
    (scores.I > scores.E ? 'I' : 'E') +
    (scores.S > scores.N ? 'S' : 'N') +
    (scores.T > scores.F ? 'T' : 'F') +
    (scores.J > scores.P ? 'J' : 'P');

  // Mapping result ke gambar (ganti path sesuai file kamu)
  const images = {
    "INTJ": "images/intj.png",
    "INFP": "images/infp.png",
    "ENTP": "images/entp.png",
    "ENFJ": "images/enfj.png",
    // tambahin semua tipe lain ya
  };

  const imgSrc = images[result] || "images/default.png";

  document.getElementById("quiz").innerHTML = "";
  document.getElementById("result").innerHTML = `
    <div>Tipe kamu: ${result}</div>
    <img src="${imgSrc}" alt="${result}" style="width:100%; margin-top:15px; border-radius:10px;">
  `;
}

showQuestion();
</script>

</body>
</html>
